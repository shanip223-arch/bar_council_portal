<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Dashboard – UP Bar Council</title>
<link rel="stylesheet" href="/assets/admin.css"/>
<style>
.sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:199; }
.sidebar-overlay.open { display:block; }
.district-bar-wrap { margin-bottom:6px; }
.district-bar-label { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:3px; }
.district-bar-track { background:#e2e8f0; border-radius:99px; height:8px; }
.district-bar-fill  { height:8px; border-radius:99px; background:var(--navy); transition:width .4s; }
.legend-list { display:flex; flex-direction:column; gap:8px; }
.legend-item { display:flex; align-items:center; gap:8px; font-size:12px; }
.legend-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.toggle-wrap { display:flex; align-items:center; gap:8px; }
.role-admin { background:#ede9fe; color:#5b21b6; }
.role-staff { background:#ccfbf1; color:#134e4a; }
.admin-section { display:none; }
.admin-section.active { display:block; }
.page-body { flex:1; padding:20px; overflow-y:auto; }
.alert-summary-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px; }
.alert-sum-box { background:#fff; border:1px solid var(--border); border-radius:10px; padding:14px 12px; text-align:center; }
.alert-sum-box .asb-val { font-size:26px; font-weight:800; color:var(--red); }
.alert-sum-box .asb-lbl { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.4px; margin-top:3px; }
@media(max-width:768px){ .alert-summary-grid { grid-template-columns:1fr 1fr; } .charts-inner { grid-template-columns:1fr !important; } .stat-grid { grid-template-columns:1fr 1fr !important; } }
@media(max-width:480px){ .stat-grid { grid-template-columns:1fr !important; } .alert-summary-grid { grid-template-columns:1fr !important; } }
</style>
</head>
<body>
<div class="sidebar-overlay" id="sideOverlay" onclick="closeSidebar()"></div>
<div class="admin-layout">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><div class="logo">⚖️</div><div class="brand-text"><div class="name">UP Bar Council</div><div class="sub">Admin Panel</div></div></div>
  <div class="sidebar-section-label">Main Menu</div>
  <nav>
    <a class="nav-link active" id="snav-dashboard" data-section="dashboard" href="#"><span class="nav-icon">📊</span> Dashboard</a>
    <a class="nav-link" id="snav-applications" data-section="applications" href="#"><span class="nav-icon">📋</span> Applications <span class="nav-badge" id="nav-badge-pending" style="display:none;">0</span></a>
    <a class="nav-link" id="snav-alerts" data-section="alerts" href="#"><span class="nav-icon">🚨</span> Alerts <span class="nav-badge" id="nav-badge-alerts" style="display:none;">!</span></a>
    <a class="nav-link" id="snav-staff" data-section="staff" href="#"><span class="nav-icon">👥</span> Staff</a>
    <a class="nav-link" id="snav-logs" data-section="logs" href="#"><span class="nav-icon">🕒</span> Activity Logs</a>
    <a class="nav-link" id="snav-objections" data-section="objections" href="#"><span class="nav-icon">⚠️</span> Objections <span class="nav-badge" id="nav-badge-obj" style="display:none;">!</span></a>
    <a class="nav-link" id="snav-uploads" data-section="uploads" href="#"><span class="nav-icon">📁</span> Uploads</a>
    <a class="nav-link" id="snav-settings" data-section="settings" href="#"><span class="nav-icon">⚙️</span> Settings</a>
  </nav>
  <div style="flex:1;"></div>
  <div class="sidebar-footer"><div class="sidebar-user"><div class="avatar" id="sideAvatar">A</div><div><div id="sideName" style="color:#e2e8f0;font-size:12px;font-weight:700;">Admin</div><div id="sideRole" style="color:#64748b;font-size:10px;">Administrator</div></div></div><button class="btn btn-ghost btn-sm btn-full" style="margin-top:8px;color:#f87171;" onclick="logoutAdmin()">🚪 Logout</button></div>
</aside>
<div class="main-content">
  <header class="top-header"><button class="menu-toggle" onclick="openSidebar()">☰</button><span class="page-title">⚖️ Admin Dashboard</span><span class="page-subtitle" id="hdrSubtitle">| UP Bar Council</span><div class="header-spacer"></div><div class="header-search"><span>🔍</span><input id="globalSearch" placeholder="Search applications…" onkeydown="if(event.key==='Enter'){showSection('applications');appSearch();}"/></div><button class="header-btn" onclick="refreshCurrentSection()" title="Refresh">🔄</button><div style="position:relative;"><button class="header-btn" id="hdrAlertBtn" onclick="showSection('alerts')" title="Alerts">🔔 <span id="hdrAlertCount" style="font-size:11px;color:var(--red);font-weight:800;"></span></button></div><button class="header-btn danger" onclick="logoutAdmin()">🚪 Logout</button></header>
  <div class="page-body admin-section active" id="dashboard">...</div>
  <div class="page-body admin-section" id="applications">
    <div class="panel">
      <div class="panel-header" style="flex-wrap:wrap;gap:10px;"><span class="panel-title">📋 All Applications</span><div class="toolbar" style="flex:1;justify-content:flex-end;"><div class="search-box"><span>🔍</span><input id="appSearchInput" placeholder="App No / Name / Mobile…" oninput="debounceApp()"/></div><div class="filter-btns"><button class="filter-btn active" onclick="setAppFilter('all',this)">All</button><button class="filter-btn" onclick="setAppFilter('pending',this)">Pending</button><button class="filter-btn" onclick="setAppFilter('objection',this)">Objection</button><button class="filter-btn" onclick="setAppFilter('under_review',this)">In Review</button><button class="filter-btn" onclick="setAppFilter('approved',this)">Approved</button><button class="filter-btn" onclick="setAppFilter('rejected',this)">Rejected</button></div></div></div>
      <div class="table-wrap"><table class="data-table"><thead><tr><th>App No</th><th>Name</th><th>Father</th><th>District</th><th>Mobile</th><th>Status</th><th>Objections</th><th>Date</th><th>Actions</th></tr></thead><tbody id="appTbody"><tr><td colspan="9"><div class="loading-overlay">⏳</div></td></tr></tbody></table></div>
      <div class="pagination" id="appPager" style="padding:12px 18px;"></div>
    </div>
  </div>
</div>
</div>
<script src="/assets/main.js"></script>
<script>
const AD={currentSection:'dashboard',appFilter:'all',appPage:1,appSearch:'',logPage:1,logSearch:'',objPage:1,objDebounce:null,appDebounce:null,logDebounce:null,currentAppId:null,blockedSections:[]};
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function statusBadge(s){const map={pending:'badge-pending',approved:'badge-approved',rejected:'badge-rejected',objection:'badge-objection',under_review:'badge-under_review'};return `<span class="badge ${map[s]||'badge-pending'}">${esc(s)}</span>`;}
function gFlash(msg,type){const el=document.getElementById('hdrSubtitle');const orig=el.textContent;el.textContent=msg;el.style.color=type==='error'?'#dc2626':'#16a34a';setTimeout(()=>{el.textContent=orig;el.style.color='';},3500);}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sideOverlay').classList.add('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sideOverlay').classList.remove('open');}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function refreshCurrentSection(){showSection(AD.currentSection);}
function showSection(id){ALL_SECTIONS.forEach(s=>{document.getElementById(s)?.classList.toggle('active',s===id);document.getElementById('snav-'+s)?.classList.toggle('active',s===id);});AD.currentSection=id;closeSidebar();if(id==='applications')loadApplications();}
function debounceApp(){AD.appSearch=document.getElementById('appSearchInput').value.trim();clearTimeout(AD.appDebounce);AD.appDebounce=setTimeout(()=>{AD.appPage=1;loadApplications();},380);}
function appSearch(){AD.appSearch=document.getElementById('globalSearch').value.trim();document.getElementById('appSearchInput').value=AD.appSearch;AD.appPage=1;loadApplications();}
function setAppFilter(f,el){AD.appFilter=f;AD.appPage=1;document.querySelectorAll('#applications .filter-btn').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active');loadApplications();}
function appGoPage(p){AD.appPage=p;loadApplications();}
async function loadApplications(){const tbody=document.getElementById('appTbody');tbody.innerHTML='<tr><td colspan="9"><div class="loading-overlay">⏳ Loading…</div></td></tr>';try{const url=`/api/admin/applications?status=${AD.appFilter}&search=${encodeURIComponent(AD.appSearch)}&page=${AD.appPage}&limit=20`;const res=await AdminAPI.get(url);const {applications=[],total=0,page=1,limit=20}=res.data;if(!applications.length){tbody.innerHTML='<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">📭</div><p>No applications found</p></div></td></tr>';document.getElementById('appPager').innerHTML='';return;}tbody.innerHTML=applications.map(a=>`<tr><td><code style="font-size:11px;">${esc(a.application_no)}</code></td><td class="truncate">${esc(a.name)}</td><td class="truncate">${esc(a.father_name)}</td><td style="font-size:12px;">${esc(a.district)}</td><td style="font-size:12px;">${esc(a.mobile)}</td><td>${statusBadge(a.status)}</td><td style="text-align:center;">${a.objection_count||0}</td><td style="font-size:12px;">${fmtDate(a.created_at)}</td><td><div style="display:flex;gap:4px;flex-wrap:wrap;"><button class="btn btn-outline btn-xs" onclick="viewApp(${a.id})">👁 View</button><button class="btn btn-outline btn-xs" onclick="editApp(${a.id})">✏️ Edit</button><button class="btn btn-outline btn-xs" onclick="deleteApp(${a.id})">🗑 Delete</button><button class="btn btn-outline btn-xs" onclick="markObjection(${a.id})">⚠ Mark Objection</button><select class="form-select" style="font-size:11px;padding:3px 6px;height:auto;" onchange="updateStatus(${a.id},this.value,this)"><option value="">Change Status</option><option value="pending" ${a.status==='pending'?'selected':''}>Pending</option><option value="objection" ${a.status==='objection'?'selected':''}>Objection</option><option value="under_review" ${a.status==='under_review'?'selected':''}>Under Review</option><option value="approved" ${a.status==='approved'?'selected':''}>Approved</option><option value="rejected" ${a.status==='rejected'?'selected':''}>Rejected</option></select></div></td></tr>`).join('');renderPager('appPager',total,page,limit,'appGoPage');}catch(e){tbody.innerHTML=`<tr><td colspan="9"><div class="alert alert-error">❌ ${esc(e.message)}</div></td></tr>`;}}
async function updateStatus(id,status,selectEl){if(!status)return;try{await AdminAPI.put(`/api/admin/applications/${id}/status`,{status});gFlash('✅ Status updated to '+status,'success');loadApplications();}catch(e){gFlash('❌ '+e.message,'error');if(selectEl)selectEl.value='';}}
async function viewApp(id){AD.currentAppId=id;openModal('appModal');}
async function editApp(id){const name=prompt('Name');if(!name)return;const father_name=prompt('Father Name');if(!father_name)return;const mobile=prompt('Mobile');if(!mobile)return;const district=prompt('District');if(!district)return;await AdminAPI.put(`/api/admin/applications/${id}`,{name,father_name,mobile,district});gFlash('✅ Application updated','success');loadApplications();}
async function deleteApp(id){if(!confirm('Delete this application?'))return;await AdminAPI.delete(`/api/admin/applications/${id}`);gFlash('✅ Application deleted','success');loadApplications();}
async function markObjection(id){await AdminAPI.post(`/api/admin/applications/${id}/objection`,{});gFlash('✅ Marked objection','success');loadApplications();}
function appPoll(){if(AD.currentSection==='applications')loadApplications();}
(function init(){const tok=getAdminToken()||getStaffToken();if(tok){const p=jwtDecode(tok);const name=p.username||'Admin';document.getElementById('sideName').textContent=name;document.getElementById('sideAvatar').textContent=name[0].toUpperCase();}loadApplications();setInterval(appPoll,8000);})();
</script>
</body>
</html>
