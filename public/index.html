<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bar Council Portal</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <div class="container">
    <h1>Bar Council Certificate Portal</h1>

    <section class="card">
      <h2>Candidate Login</h2>
      <input id="appNo" placeholder="Application No (UP12345/25)" />
      <button onclick="requestOtp()">Request OTP</button>
      <input id="otp" placeholder="OTP" />
      <button onclick="verifyOtp()">Login</button>
      <p id="candidateMsg"></p>
    </section>

    <section class="card">
      <h2>Admin/Staff Login</h2>
      <input id="username" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="adminLogin()">Login</button>
      <p id="adminMsg"></p>
    </section>

    <p><a href="/public/duplicate.html">Apply for Duplicate Certificate</a></p>
  </div>
  <script src="/assets/app.js"></script>
</body>
</html>
