<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Staff Dashboard – UP Bar Council</title>
<link rel="stylesheet" href="/assets/admin.css"/>
<style>
.staff-section { display:none; }
.staff-section.active { display:block; }
.page-body { flex:1; padding:20px; overflow-y:auto; }
.dot { width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px; }
.dot-blue{background:#3b82f6;} .dot-green{background:#16a34a;} .dot-red{background:#dc2626;} .dot-amber{background:#d97706;} .dot-gray{background:#94a3b8;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;}
.sidebar-overlay.open{display:block;}
.teal-header { background:linear-gradient(135deg,#0d5f6e,#0e8c9e); }
@media(max-width:768px){ .stat-grid{grid-template-columns:1fr 1fr !important;} .two-col{grid-template-columns:1fr !important;} }
@media(max-width:480px){ .stat-grid{grid-template-columns:1fr !important;} }
</style>
</head>
<body>
<div class="sidebar-overlay" id="sideOverlay" onclick="document.getElementById('sidebar').classList.remove('open');document.getElementById('sideOverlay').classList.remove('open');"></div>
<div class="admin-layout">
<aside class="sidebar" id="sidebar">...
</aside>
<div class="main-content">
  <header class="top-header"><button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open');document.getElementById('sideOverlay').classList.toggle('open');">☰</button><span class="page-title" id="pageTitle">📊 Staff Dashboard</span><span class="page-subtitle">| UP Bar Council</span><div class="header-spacer"></div><span id="hdrDate" style="font-size:12px;color:#64748b;margin-right:8px;"></span><button class="header-btn" onclick="reloadSection()" title="Refresh">🔄</button><button class="header-btn danger" onclick="logoutStaff()">🚪 Logout</button></header>
  <div class="page-body staff-section active" id="sec-overview">...</div>
  <div class="page-body staff-section" id="sec-upload-excel">...
    <div id="tab-manual-panel" style="display:none;">
      <div style="max-width:700px;">
        <div class="form-group"><label class="form-label">Application No</label><input class="form-input" id="manApp" placeholder="UP12345/25"/></div>
        <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="manName"/></div>
        <div class="form-group"><label class="form-label">Father Name</label><input class="form-input" id="manFather"/></div>
        <div class="form-group"><label class="form-label">Mobile</label><input class="form-input" id="manMobile"/></div>
        <div class="form-group"><label class="form-label">District</label><input class="form-input" id="manDistrict"/></div>
        <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="manStatus"><option value="pending">pending</option><option value="objection">objection</option><option value="under_review">under_review</option><option value="approved">approved</option><option value="rejected">rejected</option></select></div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;"><button class="btn btn-primary" onclick="submitManualApp()">💾 Save Application</button><div id="manMsg" class="msg" style="margin-bottom:0;"></div></div>
      </div>
    </div>
  </div>
</div>
</div>
<script src="/assets/main.js"></script>
<script>
(function guard(){const s=getStaffToken(),a=getAdminToken();if(!s&&!a){window.location.href='/admin';}})();
function pollDashboard(){loadOverview();}
(function init(){loadOverview();setInterval(pollDashboard,8000);})();
</script>
</body>
</html>
